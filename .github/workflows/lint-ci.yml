name: Lint
on:
  workflow_call:
    secrets:
      npm_token:
        description: github token for github packages
        required: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: coldsurfers/workflows/.github/actions/setup@v2
        with:
          NPM_TOKEN: ${{ secrets.npm_token }}

      - name: Run lint and typecheck
        run: npx lefthook run ci
